x-build-args: &python-build-args
  PYTHON_VERSION: ${PYTHON_VERSION:-3.13.10}

name: lesjardinsdudore

services:
  api:
    build:
      context: backend
      args:
        <<: *python-build-args
    environment:
      INVENTORY_URL: ${INVENTORY_URL}
    networks:
      default:
        aliases:
          - lesjardinsdudore-api
    command: >
      uvicorn --host=0.0.0.0 --port=80 lesjardinsdudore.api:app --log-config=/app/log-config.yaml
    restart: always
    healthcheck:
      test: [ "CMD", "python", "-c", "import socket; import sys; s=socket.socket(); s.settimeout(1); sys.exit(s.connect_ex(('localhost',80))>0)" ]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 3

  biodynamics:
    build: biodynamics
    networks:
      default:
        aliases:
          - lesjardinsdudore-biodynamics
    command: >
      biodynamics-web --host=0.0.0.0 --port=80
    restart: always
    healthcheck:
      test: [ "CMD", "python", "-c", "import socket; import sys; s=socket.socket(); s.settimeout(1); sys.exit(s.connect_ex(('localhost',80))>0)" ]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 3

  certbot:
    image: certbot/certbot:v5.5.0
    volumes:
      - ./certbot/deploy-hook.sh:/deploy-hook.sh:ro
      - certbot-certs:/etc/letsencrypt
      - certbot-www:/var/www/html
    environment:
      SERVER_HOSTNAME: ${SERVER_HOSTNAME}
    network_mode: "host"
    command: >
      sh -c "trap exit TERM; while :; do
        certbot renew --webroot --webroot-path=/var/www/html --deploy-hook /deploy-hook.sh;
        sleep 12h;
      done"
    entrypoint: ""
    restart: always
    healthcheck:
      test: [ "CMD", "test", "-e", "/etc/letsencrypt/live/${SERVER_HOSTNAME}/fullchain.pem" ]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 15

  frontend:
    build:
      context: frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    depends_on:
      api:
        condition: service_healthy
    networks:
      default:
        aliases:
          - lesjardinsdudore-frontend
    restart: always

  nginx:
    build: nginx
    depends_on:
      certbot:
        condition: service_healthy
      frontend:
        condition: service_started
      api:
        condition: service_healthy
      biodynamics:
        condition: service_healthy
      permaculture:
        condition: service_healthy
    volumes:
      - certbot-www:/web:ro
      - certbot-certs:/etc/letsencrypt:ro
      - ./nginx/conf.d/:/etc/nginx/conf.d/:z
    environment:
      SERVER_HOSTNAME: ${SERVER_HOSTNAME}
      ADDITIONAL_SERVER_NAMES: ${ADDITIONAL_SERVER_NAMES:-}
      IPV4_NETWORK: ${IPV4_NETWORK:-172.22.1}
    networks:
      default:
        ipv4_address: ${IPV4_NETWORK:-172.22.1}.240
        aliases:
          - lesjardinsdudore-nginx
    restart: always

  permaculture:
    build: permaculture
    volumes:
      - permaculture-storage:/storage
    environment:
      PERMACULTURE_DATABASE: /storage/permaculture.db
      SERVER_HOSTNAME: ${SERVER_HOSTNAME}
    networks:
      default:
        aliases:
          - lesjardinsdudore-permaculture
    command: >
      permaculture-web --host=0.0.0.0 --port=80
    restart: always
    healthcheck:
      test: [ "CMD", "python", "-c", "import socket; import sys; s=socket.socket(); s.settimeout(1); sys.exit(s.connect_ex(('localhost',80))>0)" ]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 3

  permaculture-init:
    build: permaculture
    volumes:
      - permaculture-storage:/storage
    secrets:
      - nc_password
    environment:
      PERMACULTURE_DATABASE: /storage/permaculture.db
      PERMACULTURE_STORAGE: /storage
      PERMACULTURE_NC_USERNAME: ${NC_USERNAME}
      PERMACULTURE_NC_PASSWORD_FILE: /run/secrets/nc_password
      PERMACULTURE_PFAF_FILE: ${PFAF_FILE}
    command: >
      permaculture ingest
    restart: "no"

  pihole:
    image: pihole/pihole:2026.04.0
    depends_on:
      unbound:
        condition: service_healthy
    volumes:
      - pihole-etc:/etc/pihole
    environment:
      TZ: ${TZ}
      FTLCONF_webserver_api_password: ${PI_HOLE_PASS}
      FTLCONF_dns_upstreams: unbound#53
      FTLCONF_dns_listeningMode: ALL
    ports:
      - '${DNS_PORT:-53}:53/tcp'
      - '${DNS_PORT:-53}:53/udp'
      - '${PI_HOLE_PORT:-8888}:80/tcp'
    restart: always
    dns:
      - ${IPV4_NETWORK:-172.22.1}.254

  samba:
    build: samba
    volumes:
      - ./data:/data
      - ./samba/smb.conf:/etc/samba/smb.conf:ro
    environment:
      SAMBA_USER: smbuser
      SAMBA_PASS: smbpass
      SAMBA_UID: 1000
      SAMBA_GID: 1000
    ports:
      - '137:137/udp'
      - '138:138/udp'
      - '139:139/tcp'
      - '445:445/tcp'
    network_mode: "host"
    restart: always

  unbound:
    build: unbound
    volumes:
      - ./unbound/unbound.conf:/etc/unbound/unbound.conf:ro,Z
    networks:
      default:
        ipv4_address: ${IPV4_NETWORK:-172.22.1}.254
        aliases:
          - lesjardinsdudore-unbound
    restart: always
    dns:
      - 1.1.1.1
      - 8.8.8.8

networks:
  default:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: ${IPV4_NETWORK:-172.22.3}.0/24

volumes:
  permaculture-storage:
  certbot-certs:
  certbot-www:
  pihole-etc:

secrets:
  nc_password:
    environment: NC_PASSWORD
